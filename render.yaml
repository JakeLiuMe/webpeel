services:
  - type: web
    name: webpeel-api
    runtime: docker
    dockerfilePath: Dockerfile.api
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://webpeel.dev,https://app.webpeel.dev
      - key: GITHUB_TOKEN
        sync: false
      - key: WEBSHARE_PROXY_USER
        sync: false
      - key: WEBSHARE_PROXY_PASS
        sync: false
      - key: WEBSHARE_PROXY_HOST
        sync: false
      - key: WEBSHARE_PROXY_PORT
        sync: false
      - key: WEBSHARE_PROXY_SLOTS
        sync: false
      - key: ENABLE_CACHE_WARM
        sync: false
    healthCheckPath: /health
