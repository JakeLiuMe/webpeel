apiVersion: v1
kind: Secret
metadata:
  name: webpeel-secrets
  namespace: webpeel
type: Opaque
stringData:
  # ⚠️  DO NOT put real values here — they're injected via kubectl at deploy time.
  # See: scripts/deploy-secrets.sh
  #
  # Real secrets are stored in:
  #   1. Local .env file (never committed)
  #   2. K3s cluster (kubectl create secret)
  #   3. GitHub Actions secrets (for CI/CD)
  #
  # To update secrets on K3s:
  #   kubectl delete secret webpeel-secrets -n webpeel
  #   kubectl create secret generic webpeel-secrets -n webpeel \
  #     --from-literal=DATABASE_URL='...' \
  #     --from-literal=JWT_SECRET='...' \
  #     --from-literal=STRIPE_SECRET_KEY='...' \
  #     --from-literal=STRIPE_WEBHOOK_SECRET='...' \
  #     --from-literal=STRIPE_PRICE_PRO='...' \
  #     --from-literal=STRIPE_PRICE_MAX='...'
  DATABASE_URL: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  STRIPE_SECRET_KEY: "REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME"
  STRIPE_PRICE_PRO: "REPLACE_ME"
  STRIPE_PRICE_MAX: "REPLACE_ME"
