apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: webpeel
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: webpeel:api
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: CORS_ORIGINS
          value: "https://webpeel.dev,https://app.webpeel.dev"
        - name: API_MODE
          value: "queue"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: JWT_SECRET
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: STRIPE_SECRET_KEY
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: STRIPE_WEBHOOK_SECRET
        - name: STRIPE_PRICE_PRO
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: STRIPE_PRICE_PRO
        - name: STRIPE_PRICE_MAX
          valueFrom:
            secretKeyRef:
              name: webpeel-secrets
              key: STRIPE_PRICE_MAX
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: webpeel
  labels:
    app: api
spec:
  type: LoadBalancer
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api
---
apiVersion: v1
kind: Service
metadata:
  name: api-internal
  namespace: webpeel
  labels:
    app: api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api
